<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velaluna — Luxury Scented Candles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.dom.min.js"></script>

  <style>
    :root {
      --bg-base: #121212;
      --bg-surface: #1a1a1a;
      --bg-card: #1e1c1a;
      --cream: #fbf7f0;
      --warm-gray: #e6dfd3;
      --amber: #ffb84d;
      --amber-dim: rgba(255,184,77,0.12);
      --amber-glow: rgba(255,184,77,0.06);
      --text-primary: #f5efe6;
      --text-secondary: #9e9488;
      --text-muted: #5a5450;
      --border-subtle: rgba(255,255,255,0.05);
      --border-warm: rgba(255,184,77,0.2);
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background-color: rgba(255,184,77,0.25);
      color: var(--cream);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: rgba(255,184,77,0.3); border-radius: 2px; }

    /* Hide scrollbar for carousel */
    .carousel-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .carousel-scroll::-webkit-scrollbar { display: none; }

    /* Typography */
    .font-serif { font-family: var(--font-serif); }
    .font-sans { font-family: var(--font-sans); }

    /* Premium easing */
    .ease-premium { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }

    /* Candle glow animation */
    @keyframes breathe {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.08); }
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.9; transform: scaleY(1) translateX(-50%); }
      25% { opacity: 0.7; transform: scaleY(0.95) translateX(-48%); }
      75% { opacity: 0.85; transform: scaleY(1.02) translateX(-52%); }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .candle-breathe { animation: breathe 4s ease-in-out infinite; }
    .candle-drift { animation: drift 6s ease-in-out infinite; }
    .candle-flicker { animation: flicker 2.5s ease-in-out infinite; }

    .panel-enter { animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .panel-exit { animation: slideOutRight 0.4s cubic-bezier(0.4, 0, 1, 1) forwards; }
    .overlay-enter { animation: fadeIn 0.3s ease forwards; }

    /* Floating label inputs */
    .float-group { position: relative; }
    .float-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--cream);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 300;
      padding: 20px 16px 8px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                  background 0.3s ease,
                  box-shadow 0.3s ease;
      letter-spacing: 0.01em;
    }
    .float-input:focus {
      border-color: rgba(255,184,77,0.35);
      background: rgba(255,184,77,0.04);
      box-shadow: 0 0 0 3px rgba(255,184,77,0.06), inset 0 1px 3px rgba(0,0,0,0.3);
    }
    .float-label {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .float-input:focus ~ .float-label,
    .float-input:not(:placeholder-shown) ~ .float-label {
      top: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--amber);
    }

    /* Card hover effects */
    .product-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }
    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,184,77,0.06) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .product-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(255,184,77,0.22);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,184,77,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .product-card:hover::before { opacity: 1; }

    /* Nav */
    .nav-link {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 400;
    }
    .nav-link:hover { color: var(--cream); }

    /* Payment card */
    .pay-card {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;

      background: rgba(255,255,255,0.02);
      position: relative;
      overflow: hidden;
    }
    .pay-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,184,77,0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;

    .pay-card:hover {
      border-color: rgba(255,184,77,0.2);
      background: rgba(255,184,77,0.04);
      transform: translateY(-1px);
    }
    .pay-card.active {
      border-color: var(--amber);
      background: rgba(255,184,77,0.08);
      box-shadow: 0 0 20px rgba(255,184,77,0.15), 0 0 0 1px rgba(255,184,77,0.3);
      transform: scale(1.02);
    }
    .pay-card.active::after { opacity: 1; }

    .btn-primary {
      background: linear-gradient(135deg, #ffb84d 0%, #f0a030 100%);
      color: #1a1200;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;

    .btn-primary::before {
      content: '';
      position: absolute;

      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;

    .btn-primary:hover::before { left: 100%; }
    .btn-primary:active { transform: translateY(0px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.15);
      color: var(--cream);
      background: rgba(255,255,255,0.04);
    }

    /* Section spacing */
    .section { padding: 120px 0; }

    /* Eyebrow label */
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--amber);
      font-family: var(--font-sans);
      font-weight: 400;
    }

    /* Divider */
    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }

    /* Success state */
    @keyframes checkPop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }

      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .check-anim { animation: checkPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Responsive grid */
    @media (min-width: 1024px) {
      .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    }
    @media (max-width: 1023px) {
      .product-grid-mobile {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 16px;
        padding-bottom: 16px;
        -webkit-overflow-scrolling: touch;
      }
      .product-card-mobile {
        flex: 0 0 82vw;
        max-width: 340px;
        scroll-snap-align: start;
      }
    }

    /* Noise texture overlay */
    .noise::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* Marquee */
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .marquee-inner { animation: marquee 22s linear infinite; white-space: nowrap; display: flex; }

    /* Toast */
    @keyframes toastIn {
      from { transform: translateY(20px) translateX(-50%); opacity: 0; }
      to { transform: translateY(0) translateX(-50%); opacity: 1; }
    }
    .toast { animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Scroll indicator */
    @keyframes scrollPulse {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(6px); opacity: 1; }
    }
    .scroll-indicator { animation: scrollPulse 2s ease-in-out infinite; }
  </style>
</head>

                          padding: '12px 14px', background: 'rgba(255,255,255,0.02)', borderRadius: '8px',
                          border: '1px solid rgba(255,255,255,0.04)',
                        }
                      },
                        React.createElement('div', null,
                          React.createElement('div', { style: { fontFamily: 'Playfair Display, serif', fontSize: '14px', color: 'var(--cream)' } }, item.name),
                          React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' } }, item.notes)
                        ),
                        React.createElement('div', { style: { fontFamily: 'Playfair Display, serif', fontSize: '16px', color: 'var(--cream)' } },
                          React.createElement('span', { style: { fontSize: '10px', color: 'var(--text-muted)', marginRight: '2px' } }, 'EGP'),
                          item.price.toLocaleString()
                        )
                      )
                    )
                  ),
                  cartItems.length > 0 && React.createElement('div', {
                    style: {
                      display: 'flex', justifyContent: 'space-between', marginTop: '12px',
                      padding: '12px 14px', background: 'rgba(255,184,77,0.05)', borderRadius: '8px', border: '1px solid rgba(255,184,77,0.1)'
                    }
                  },
                    React.createElement('span', { style: { fontSize: '11px', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--text-secondary)' } }, 'Total'),
                    React.createElement('span', { style: { fontFamily: 'Playfair Display, serif', fontSize: '18px', color: 'var(--amber)' } },
                      React.createElement('span', { style: { fontSize: '11px', color: 'var(--text-secondary)', marginRight: '3px' } }, 'EGP'),
                      total.toLocaleString()
                    )
                  )
                ),

                // Divider
                React.createElement('div', { className: 'divider-line', style: { marginBottom: '28px' } }),

                // Form fields
                React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '14px', marginBottom: '28px' } },
                  React.createElement('p', { style: { fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: '4px' } }, 'Delivery Information'),
                  React.createElement(FloatInput, { field: 'name', label: 'Full Name' }),
                  React.createElement(FloatInput, { field: 'email', label: 'Email Address', type: 'email' }),
                  React.createElement(FloatInput, { field: 'address', label: 'Detailed Address' }),
                  React.createElement(FloatInput, { field: 'city', label: 'City' }),
                ),

                // Divider
                React.createElement('div', { className: 'divider-line', style: { marginBottom: '28px' } }),

                // Payment method
                React.createElement('div', { style: { marginBottom: '36px' } },
                  React.createElement('p', { style: { fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: '16px' } }, 'Payment Method'),
                  React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '10px' } },
                    PAYMENT_METHODS.map(method =>
                      React.createElement('div', {
                        key: method.id,
                        className: `pay-card ${payment === method.id ? 'active' : ''}`,
                        onClick: () => setPayment(method.id),
                      },
                        React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative', zIndex: 1 } },
                          React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '14px' } },
                            React.createElement('span', { style: { fontSize: '22px' } }, method.icon),
                            React.createElement('div', null,
                              React.createElement('div', { style: { fontFamily: 'DM Sans, sans-serif', fontSize: '14px', fontWeight: '400', color: payment === method.id ? 'var(--cream)' : 'var(--text-secondary)' } }, method.label),
                              React.createElement('div', { style: { fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' } }, method.sub)
                            )
                          ),
                          React.createElement('div', {
                            style: {
                              width: '20px', height: '20px', borderRadius: '50%',
                              border: payment === method.id ? '2px solid var(--amber)' : '1px solid rgba(255,255,255,0.1)',
                              background: payment === method.id ? 'var(--amber)' : 'transparent',
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              transition: 'all 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
                              flexShrink: 0,
                            }
                          },
                            payment === method.id && React.createElement(Icon, { name: 'check', size: 11, color: '#1a1200', strokeWidth: 2.5 })
                          )
                        )
                      )
                    )
                  )
                ),

                // Submit
                React.createElement('button', {
                  className: 'btn-primary',
                  onClick: handleSubmit,
                  style: {
                    width: '100%', padding: '16px',
                    opacity: (!form.name || !form.email || !form.address || !form.city || !payment || submitting) ? 0.4 : 1,
                    cursor: (!form.name || !form.email || !form.address || !form.city || !payment) ? 'not-allowed' : 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px',
                    transition: 'all 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
                    fontSize: '12px',
                  },
                  disabled: submitting
                },
                  submitting
                    ? React.createElement(React.Fragment, null,
                        React.createElement('div', { style: { width: '16px', height: '16px', border: '2px solid rgba(26,18,0,0.3)', borderTopColor: '#1a1200', borderRadius: '50%', animation: 'spin 0.8s linear infinite' } }),
                        'Processing...'
                      )
                    : React.createElement(React.Fragment, null,
                        React.createElement(Icon, { name: 'send', size: 15, color: '#1a1200' }),
                        'Confirm Order'
                      )
                ),

                React.createElement('p', {
                  style: { textAlign: 'center', fontSize: '11px', color: 'var(--text-muted)', marginTop: '16px', letterSpacing: '0.05em' }

              )
        )
      );
    };

    // ─── Toast ────────────────────────────────────────────────────────────────
    const Toast = ({ message, visible }) =>
      visible ? React.createElement('div', {
        className: 'toast',
        style: {
          position: 'fixed', bottom: '32px', left: '50%',
          transform: 'translateX(-50%)',
          background: 'rgba(255,184,77,0.12)', border: '1px solid rgba(255,184,77,0.25)',
          borderRadius: '40px', padding: '12px 24px', zIndex: 300,
          fontFamily: 'DM Sans, sans-serif', fontSize: '13px', color: 'var(--cream)',
          backdropFilter: 'blur(12px)', display: 'flex', alignItems: 'center', gap: '10px',
          boxShadow: '0 8px 30px rgba(0,0,0,0.4)',
        }
      },
        React.createElement(Icon, { name: 'check', size: 14, color: 'var(--amber)' }),
        message
      ) : null;

    // ─── Footer ───────────────────────────────────────────────────────────────
    const Footer = () => {
      const socials = [
        { name: 'TikTok', icon: 'music2', color: '#e9967a' },
        { name: 'Instagram', icon: 'instagram', color: '#c084fc' },
        { name: 'WhatsApp', icon: 'messageCircle', color: '#4ade80' },
      ];
      const [hovered, setHovered] = useState(null);

      return React.createElement('footer', {
        style: {
          borderTop: '1px solid rgba(255,255,255,0.04)', padding: '48px 60px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '24px',
          background: 'rgba(255,255,255,0.01)',
        }
      },
        React.createElement('div', null,
          React.createElement('div', {
            style: { fontFamily: 'Playfair Display, serif', fontSize: '22px', fontWeight: '400', color: 'var(--cream)', letterSpacing: '0.1em', marginBottom: '6px' }
          }, 'Velaluna'),
          React.createElement('div', {
            style: { fontSize: '10px', letterSpacing: '0.3em', textTransform: 'uppercase', color: 'var(--text-muted)' }
          }, 'Luxury Scented Candles — Cairo, EG')
        ),

        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '20px' } },
          socials.map(s =>
            React.createElement('a', {
              key: s.name, href: '#',
              style: {
                width: '40px', height: '40px', borderRadius: '50%',
                background: hovered === s.name ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)',
                border: `1px solid ${hovered === s.name ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.05)'}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: hovered === s.name ? s.color : 'var(--text-muted)',
                transition: 'all 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
                transform: hovered === s.name ? 'translateY(-2px) scale(1.08)' : 'none',
                textDecoration: 'none',
              },
              onMouseEnter: () => setHovered(s.name),
              onMouseLeave: () => setHovered(null),
              title: s.name,
            },
              React.createElement(Icon, { name: s.icon, size: 16 })
            )
          )
        ),

        React.createElement('div', {
          style: { fontSize: '10px', letterSpacing: '0.3em', textTransform: 'uppercase', color: 'var(--text-muted)' }
        },
          React.createElement('span', { style: { color: 'rgba(255,255,255,0.15)', marginRight: '8px' } }, '©2024'),
          'Web by ',
          React.createElement('span', { style: { color: 'var(--cream)', fontWeight: '400' } }, 'Yassin')
        )
      );
    };

    // ─── Brand Story Strip ────────────────────────────────────────────────────
    const BrandStory = () =>
      React.createElement('section', { style: { padding: '120px 60px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '80px', alignItems: 'center' } },
        React.createElement('div', null,
          React.createElement('p', { className: 'eyebrow', style: { marginBottom: '20px' } }, 'The Philosophy'),
          React.createElement('h2', {
            style: { fontFamily: 'Playfair Display, serif', fontSize: 'clamp(28px, 3.5vw, 48px)', fontWeight: '400', color: 'var(--cream)', lineHeight: '1.2', marginBottom: '24px' }
          }, React.createElement('span', { style: { fontStyle: 'italic' } }, '"Scent is the only sense that bypasses rational thought."')),
          React.createElement('p', { style: { fontFamily: 'DM Sans, sans-serif', fontWeight: '300', fontSize: '15px', lineHeight: '1.8', color: 'var(--text-secondary)', marginBottom: '32px' } },
            'Every Velaluna candle begins as an idea — a moment, a memory, an atmosphere. Our perfumers work in the tradition of Grasse, layering top, heart, and base notes with the patience of a sculptor.'
          ),
          React.createElement('div', { style: { display: 'flex', gap: '16px' } },
            React.createElement('button', { className: 'btn-ghost' }, 'Read our Manifesto'),
          )
        ),
        React.createElement('div', {
          style: {
            background: 'var(--bg-surface)', borderRadius: '20px', border: '1px solid rgba(255,255,255,0.04)',
            padding: '48px', position: 'relative', overflow: 'hidden',
          }
        },
          React.createElement('div', {
            style: {
              position: 'absolute', top: 0, right: 0, width: '200px', height: '200px',
              background: 'radial-gradient(ellipse at 80% 20%, rgba(255,184,77,0.08) 0%, transparent 70%)',
              pointerEvents: 'none',
            }
          }),
          [
            ['Hand-poured', 'Every candle is poured by hand in our Cairo atelier, in batches of no more than 24.'],
            ['Natural wax blend', 'A proprietary blend of coconut and apricot wax burns cleanly with superior scent throw.'],
            ['Refillable vessels', 'Our vessels are designed for life. Each can be cleaned and refilled — a ritual in itself.'],
          ].map(([title, body], i) =>
            React.createElement('div', {
              key: i,
              style: { marginBottom: i < 2 ? '32px' : '0', paddingBottom: i < 2 ? '32px' : '0', borderBottom: i < 2 ? '1px solid rgba(255,255,255,0.04)' : 'none' }
            },
              React.createElement('div', { style: { fontFamily: 'Playfair Display, serif', fontSize: '17px', color: 'var(--cream)', marginBottom: '8px' } }, title),
              React.createElement('div', { style: { fontFamily: 'DM Sans, sans-serif', fontWeight: '300', fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.7' } }, body)
            )
          )
        )
      );

    // ─── App ─────────────────────────────────────────────────────────────────
    const App = () => {
      const [cartItems, setCartItems] = useState([]);
      const [panelOpen, setPanelOpen] = useState(false);
      const [toast, setToast] = useState({ visible: false, message: '' });

      const showToast = (msg) => {
        setToast({ visible: true, message: msg });
        setTimeout(() => setToast({ visible: false, message: '' }), 3000);
      };

      const handleAddToCart = (product) => {
        setCartItems(prev => [...prev, product]);
        showToast(`${product.name} added to your cart`);
      };

      const scrollToProducts = () => {
        document.getElementById('collection')?.scrollIntoView({ behavior: 'smooth' });
      };

      return React.createElement('div', { style: { minHeight: '100vh', background: 'var(--bg-base)' } },
        React.createElement(Navbar, { cartCount: cartItems.length, onCartOpen: () => setPanelOpen(true) }),
        React.createElement(Hero, { onShopClick: scrollToProducts }),
        React.createElement(MarqueeBand),
        React.createElement(ProductsSection, { onAddToCart: handleAddToCart }),
        React.createElement('div', { className: 'divider-line', style: { margin: '0 60px' } }),
        React.createElement(BrandStory),
        React.createElement(Footer),

        panelOpen && React.createElement(CheckoutPanel, {
          cartItems,
          onClose: () => setPanelOpen(false),
        }),

        React.createElement(Toast, { message: toast.message, visible: toast.visible }),

        // Spin keyframe
        React.createElement('style', null, `
          @keyframes spin { to { transform: rotate(360deg); } }
          @media (max-width: 768px) {
            section { padding: 80px 24px !important; }
            nav { padding: 16px 20px !important; }
            footer { padding: 40px 24px !important; }
            div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; gap: 40px !important; }
          }
        `)
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  })();
  </script>
</body>
